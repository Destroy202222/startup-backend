<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faceit — поиск игроков 5x5</title>
    <style>
        /* ----- СБРОС И ШРИФТЫ ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0e14;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            line-height: 1.5;
        }

        /* ----- КОНТЕЙНЕР ----- */
        .container {
            position: relative;
            max-width: 1200px;
            width: 100%;
            background: rgba(14, 18, 30, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 32px 36px 36px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 1;
        }

        /* ----- ДЕКОРАТИВНЫЙ ФОН (CSS-графика) ----- */
        .bg-art {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            border-radius: 40px;
        }

        .bg-art::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 20% 80%, rgba(88, 130, 255, 0.10) 0%, transparent 80%),
                radial-gradient(ellipse 50% 50% at 80% 20%, rgba(0, 230, 255, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 60% 70%, rgba(120, 80, 255, 0.05) 0%, transparent 60%);
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            filter: blur(80px);
        }
        .shape--1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.12), transparent 70%);
            top: -150px;
            right: -100px;
            animation: float 18s infinite alternate ease-in-out;
        }
        .shape--2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(120, 80, 255, 0.10), transparent 70%);
            bottom: -120px;
            left: -80px;
            animation: float 22s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.05); }
        }

        /* ----- ШАПКА ----- */
        .header {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .logo {
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f4ff, #5882ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo span {
            font-weight: 400;
            font-size: 16px;
            background: none;
            -webkit-text-fill-color: rgba(255,255,255,0.3);
            margin-left: 6px;
        }

        .nav {
            display: flex;
            gap: 28px;
            font-size: 14px;
            font-weight: 500;
        }
        .nav a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.3s;
            position: relative;
        }
        .nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #5882ff, #00e6ff);
            transition: width 0.3s;
        }
        .nav a:hover {
            color: #fff;
        }
        .nav a:hover::after {
            width: 100%;
        }

        /* ----- ПОИСКОВАЯ СЕКЦИЯ ----- */
        .search-section {
            position: relative;
            z-index: 2;
            margin: 28px 0 32px;
        }

        .search-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .search-title small {
            font-weight: 400;
            font-size: 16px;
            color: rgba(255,255,255,0.3);
            margin-left: 10px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(4px);
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 400;
        }
        .search-input:focus {
            border-color: rgba(88, 130, 255, 0.5);
            box-shadow: 0 0 0 4px rgba(88, 130, 255, 0.08);
        }

        .search-btn {
            padding: 14px 32px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #5882ff, #3b5fd9);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 8px 24px rgba(88, 130, 255, 0.2);
        }
        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 32px rgba(88, 130, 255, 0.3);
        }

        /* ----- СТАТИСТИКА ЛОББИ (сбор команды) ----- */
        .lobby-stats {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
            padding: 14px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,255,255,0.04);
            backdrop-filter: blur(8px);
        }

        .lobby-stats span {
            font-weight: 500;
            color: rgba(255,255,255,0.5);
        }
        .lobby-stats .count {
            font-weight: 700;
            font-size: 22px;
            color: #fff;
            margin-right: 4px;
        }
        .lobby-stats .highlight {
            color: #5882ff;
        }
        .lobby-stats .invite-btn {
            margin-left: auto;
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid rgba(88, 130, 255, 0.3);
            background: transparent;
            color: #5882ff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .lobby-stats .invite-btn:hover {
            background: rgba(88, 130, 255, 0.1);
            border-color: #5882ff;
        }

        /* ----- СЕТКА ИГРОКОВ ----- */
        .players-grid {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .player-card {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            padding: 20px 14px 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .player-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(88, 130, 255, 0.15);
            transform: translateY(-4px);
        }
        .player-card .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2f44, #1b1f2e);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.05);
        }
        .player-card .name {
            font-weight: 600;
            font-size: 17px;
            color: #fff;
            letter-spacing: 0.2px;
        }
        .player-card .level {
            font-size: 13px;
            font-weight: 500;
            color: #5882ff;
            margin: 4px 0 10px;
            background: rgba(88,130,255,0.12);
            display: inline-block;
            padding: 2px 14px;
            border-radius: 20px;
        }
        .player-card .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }
        .player-card .stats strong {
            color: #fff;
            font-weight: 600;
        }
        .player-card .invite {
            padding: 6px 20px;
            border-radius: 40px;
            border: none;
            background: rgba(88,130,255,0.15);
            color: #5882ff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .player-card .invite:hover {
            background: rgba(88,130,255,0.25);
        }
        .player-card .invite.invited {
            background: rgba(0,230,200,0.15);
            color: #00e6c8;
            cursor: default;
        }

        /* ----- ПОДВАЛ (соцсети) ----- */
        .footer {
            position: relative;
            z-index: 2;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .footer .copy {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
        }
        .footer .links {
            display: flex;
            gap: 24px;
        }
        .footer .links a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .footer .links a:hover {
            color: #fff;
        }

        /* ----- АДАПТИВ ----- */
        @media (max-width: 820px) {
            .container { padding: 24px 20px; }
            .search-title { font-size: 22px; }
            .lobby-stats { flex-direction: column; align-items: stretch; gap: 12px; }
            .lobby-stats .invite-btn { margin-left: 0; }
        }
        @media (max-width: 540px) {
            .header { flex-direction: column; align-items: flex-start; }
            .nav { gap: 16px; font-size: 13px; flex-wrap: wrap; }
            .search-title { font-size: 20px; }
            .search-bar { flex-direction: column; }
            .search-btn { width: 100%; }
            .players-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 400px) {
            .players-grid { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Декоративный фон -->
    <div class="bg-art">
        <div class="shape shape--1"></div>
        <div class="shape shape--2"></div>
    </div>

    <!-- Шапка -->
    <header class="header">
        <div class="logo">Faceit <span>| поиск 5x5</span></div>
        <nav class="nav">
            <a href="#">Игроки</a>
            <a href="#">Лобби</a>
            <a href="#">Рейтинг</a>
            <a href="#">Матчи</a>
        </nav>
    </header>

    <!-- Поиск -->
    <div class="search-section">
        <div class="search-title">
            Найди тиммейтов <small>для игры 5 на 5</small>
        </div>
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск по нику или уровню (1–10)" />
            <button class="search-btn" id="searchBtn">🔍 Найти</button>
        </div>
    </div>

    <!-- Статистика лобби -->
    <div class="lobby-stats" id="lobbyStats">
        <span>👥 В лобби: <span class="count" id="lobbyCount">0</span> / 5</span>
        <span>⭐ Уровень команды: <span class="highlight" id="avgLevel">—</span></span>
        <button class="invite-btn" id="clearLobbyBtn">Очистить лобби</button>
    </div>

    <!-- Сетка игроков -->
    <div class="players-grid" id="playersGrid"></div>

    <!-- Подвал -->
    <div class="footer">
        <div class="copy">© 2026 Faceit-подобный тест</div>
        <div class="links">
            <a href="#">Telegram</a>
            <a href="#">Discord</a>
            <a href="#">YouTube</a>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- ДАННЫЕ (статичные, без переменных) -----
        const players = [
            { name: 's1mple', level: 10, kd: 1.45, winrate: 68, avatar: 'S' },
            { name: 'NiKo', level: 9, kd: 1.32, winrate: 62, avatar: 'N' },
            { name: 'ZywOo', level: 10, kd: 1.50, winrate: 71, avatar: 'Z' },
            { name: 'dev1ce', level: 8, kd: 1.28, winrate: 59, avatar: 'D' },
            { name: 'electronic', level: 7, kd: 1.20, winrate: 55, avatar: 'E' },
            { name: 'dupreeh', level: 8, kd: 1.19, winrate: 58, avatar: 'D' },
            { name: 'flamie', level: 6, kd: 1.12, winrate: 50, avatar: 'F' },
            { name: 'GuardiaN', level: 7, kd: 1.22, winrate: 52, avatar: 'G' },
            { name: 'olofmeister', level: 9, kd: 1.30, winrate: 64, avatar: 'O' },
            { name: 'JW', level: 6, kd: 1.15, winrate: 47, avatar: 'J' },
            { name: 'karrigan', level: 8, kd: 1.10, winrate: 60, avatar: 'K' },
            { name: 'rain', level: 7, kd: 1.18, winrate: 53, avatar: 'R' },
            { name: 'shox', level: 8, kd: 1.21, winrate: 57, avatar: 'S' },
            { name: 'kennyS', level: 9, kd: 1.33, winrate: 65, avatar: 'K' },
            { name: 'apEX', level: 7, kd: 1.17, winrate: 54, avatar: 'A' }
        ];

        // ----- СОСТОЯНИЕ ЛОББИ -----
        let lobby = []; // массив ников приглашённых

        // DOM-элементы
        const grid = document.getElementById('playersGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const lobbyCountEl = document.getElementById('lobbyCount');
        const avgLevelEl = document.getElementById('avgLevel');
        const clearLobbyBtn = document.getElementById('clearLobbyBtn');

        // ----- ОТРИСОВКА КАРТОЧЕК -----
        function renderPlayers(filter = '') {
            const query = filter.trim().toLowerCase();
            let filtered = players;

            if (query !== '') {
                // поиск по нику или по уровню (число)
                filtered = players.filter(p => {
                    const nameMatch = p.name.toLowerCase().includes(query);
                    const levelMatch = String(p.level).includes(query);
                    return nameMatch || levelMatch;
                });
            }

            // Сортируем по уровню (по убыванию) для красоты
            filtered.sort((a, b) => b.level - a.level);

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:rgba(255,255,255,0.2);">Игроки не найдены</div>`;
                return;
            }

            let html = '';
            filtered.forEach(p => {
                const isInvited = lobby.includes(p.name);
                const inviteClass = isInvited ? 'invited' : '';
                const inviteText = isInvited ? '✅ В лобби' : '➕ Пригласить';
                html += `
                    <div class="player-card" data-name="${p.name}">
                        <div class="avatar">${p.avatar}</div>
                        <div class="name">${p.name}</div>
                        <div class="level">Уровень ${p.level}</div>
                        <div class="stats">
                            <span>K/D <strong>${p.kd.toFixed(2)}</strong></span>
                            <span>ВР <strong>${p.winrate}%</strong></span>
                        </div>
                        <button class="invite ${inviteClass}" data-name="${p.name}">${inviteText}</button>
                    </div>
                `;
            });

            grid.innerHTML = html;

            // Навешиваем обработчики на кнопки "Пригласить"
            document.querySelectorAll('.invite').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const name = this.dataset.name;
                    if (this.classList.contains('invited')) {
                        // уже в лобби — убираем
                        lobby = lobby.filter(n => n !== name);
                    } else {
                        // добавляем, если не больше 5
                        if (lobby.length >= 5) {
                            alert('Нельзя пригласить больше 5 игроков.');
                            return;
                        }
                        if (!lobby.includes(name)) {
                            lobby.push(name);
                        }
                    }
                    updateLobbyStats();
                    renderPlayers(searchInput.value); // перерисовываем с текущим фильтром
                });
            });
        }

        // ----- ОБНОВЛЕНИЕ СТАТИСТИКИ ЛОББИ -----
        function updateLobbyStats() {
            lobbyCountEl.textContent = lobby.length;
            if (lobby.length === 0) {
                avgLevelEl.textContent = '—';
                return;
            }
            // средний уровень приглашённых
            const invitedPlayers = players.filter(p => lobby.includes(p.name));
            const sum = invitedPlayers.reduce((acc, p) => acc + p.level, 0);
            const avg = (sum / invitedPlayers.length).toFixed(1);
            avgLevelEl.textContent = avg;
        }

        // ----- ОЧИСТКА ЛОББИ -----
        function clearLobby() {
            lobby = [];
            updateLobbyStats();
            renderPlayers(searchInput.value);
        }

        // ----- ОБРАБОТЧИКИ ПОИСКА -----
        function handleSearch() {
            renderPlayers(searchInput.value);
        }

        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('input', handleSearch); // поиск в реальном времени
        clearLobbyBtn.addEventListener('click', clearLobby);

        // ----- ИНИЦИАЛИЗАЦИЯ -----
        renderPlayers('');
        updateLobbyStats();
    })();
</script>

</body>
</html>
